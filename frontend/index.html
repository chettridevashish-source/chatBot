<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- what does input and label combo do? -->
    <!-- <input type = "checkbox" id = "chat-toggle"> -->

    <label for = "chat-toggle" id = "chat-widget">
        <span>CHAT</span>
    </label>
    <!-- Now if you press on id chat-widget, then the checkbox will be ticked -->

    <div id="chat-container" class = "opacity">

        <div id="chat-header">
            <h2>AI Assistant</h2>
        </div>
        <button id = "max">
            <!-- <i class="fa-solid fa-maximize"></i> -->
             <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
        </button>
        <button id = "cross">x</button>

        <div id="chat-body">
            

            <div id="welcome-container">
                <p class="welcome-text"> 👋 Welcome to Sikkim SSO.<br>What life event can I help you navigate today?</p>
                     <div class="event-manager-box">
                        <button class="event-btn" data-event="shop">🏬 Want to open a shop / business</button>
                        <button class="event-btn" data-event="student">🎓 Need student certificates (ST/COI)</button>
                        <button class="event-btn" data-event="land">🏔️ Land / Lineage verification</button>
                    </div>
            </div>


        </div>

        <div id="chat-text">
            <input type = "text" placeholder=" Enter your message..." id = "user-input">
            <button id = "sendbutton">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
            
        </div>

    </div>

<script src = "jav.js"></script>

</body>
</html>
