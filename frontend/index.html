<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- what does input and label combo do? -->
    <input type = "checkbox" id = "chat-toggle">

    <label for = "chat-toggle" id = "chat-widget">
        <span>CHAD</span>
    </label>
    <!-- Now if you press on id chat-widget, then the checkbox will be ticked -->

    <div id="chat-container">

        <div id="chat-header">
            <h3>CHAD THE BOT</h3>
        </div>

        <div id="chat-body">
            
        </div>

        <div id="chat-text">
            <input type = "text" placeholder=" Enter your message..." id = "user-input">
            <button id = "sendbutton">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
            
        </div>

    </div>

<script src = "jav.js"></script>

</body>
</html>
